server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-threads: 200
    accept-count: 100
    max-connections: 8192
    connection-timeout: 30000
    uri-encoding: UTF-8

spring:
  application:
    name: z-brain
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 500MB
      file-size-threshold: 2MB
  ai:
    vectorstore:
      pgvector:
        table-name: kb_chunks
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: false
        max-document-batch-size: 20

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# ==================== MyBatis 配置 ====================
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.kong.zbrain.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ==================== Z-Brain 业务配置 ====================
zbrain:
  # 文档处理相关
  document:
    upload-dir: ./data/uploads
    parsed-dir: ./data/parsed
    # 允许的文件类型
    allowed-types: pdf,doc,docx,ppt,pptx,txt,md,html,xls,xlsx
  # 分块策略（双层递归字符分块，父层粗切 + 子层细切）
  chunk:
    # 父层切分器（保留完整语义上下文）
    parent-token-size: 1000
    parent-overlap: 150
    # 子层切分器（用于精确向量检索，约为父块的 1/3）
    child-token-size: 300
    child-overlap: 40
  # 检索相关
  retrieval:
    vector-top-k: 20
    fulltext-top-k: 20
    rrf-k: 60
    rerank-top-n: 5
  # 查询预处理（系统级控制，不对用户暴露）
  query-preprocess:
    enable-query-rewrite: true
  # LLM 上下文预算
  llm:
    context-token-budget: 8000
    reserve-token: 2000
    # 强制引用标记前缀
    citation-prefix: "doc_"
  # Redis Key 前缀与 TTL
  cache:
    prefix: "zbrain:"
    doc-progress-ttl: 86400       # 1 天
    chat-context-ttl: 7200        # 2 小时
    embedding-ttl: 604800         # 7 天
  # 百炼 SDK 运维参数
  dashscope:
    # 批量向量化每批最大条数（百炼 API 限制最多 10 条）
    embedding-batch-size: 10
    # 超时（毫秒）
    timeout: 60000
    # 重试次数
    retry: 3


# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    cn.kong.zbrain: DEBUG
    cn.kong.zbrain.mapper: INFO
    org.springframework.web: INFO
    org.mybatis: INFO
  file:
    name: ./logs/z-brain.log
    max-size: 100MB
    max-history: 30

# ==================== Actuator ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ==================== Knife4j ====================
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
