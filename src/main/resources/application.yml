server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-threads: 200
    accept-count: 100
    max-connections: 8192
    connection-timeout: 30000
    uri-encoding: UTF-8

spring:
  application:
    name: eon
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 500MB
      file-size-threshold: 2MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# ==================== MyBatis 配置 ====================
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.kong.eon.persistence.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ==================== eon 业务配置 ====================
eon:
  # 文档处理相关
  document:
    upload-dir: ./data/uploads
    parsed-dir: ./data/parsed
    # 允许的文件类型
    allowed-types: pdf,doc,docx,ppt,pptx,txt,md,html,xls,xlsx
  # 分块策略（双层递归字符分块，父层粗切 + 子层细切）
  chunk:
    # 父层切分器（保留完整语义上下文）
    parent-token-size: 1000
    parent-overlap: 150
    # 子层切分器（用于精确向量检索，约为父块的 1/3）
    child-token-size: 300
    child-overlap: 40
  # 检索相关
  retrieval:
    vector-top-k: 20
    fulltext-top-k: 20
    rrf-k: 60
    rerank-top-n: 5
  # 查询预处理（系统级控制，不对用户暴露）
  query-preprocess:
    enable-query-rewrite: true
  # LLM 上下文预算
  llm:
    context-token-budget: 8000
    reserve-token: 2000
    # 强制引用标记前缀
    citation-prefix: "doc_"
  # Redis Key 前缀与 TTL
  cache:
    prefix: "eon:"
    doc-progress-ttl: 86400       # 1 天
    chat-context-ttl: 7200        # 2 小时
    embedding-ttl: 604800         # 7 天
  # ==================== Agent 个人助手 ====================
  agent:
    # workspace md 资产目录（Git 管理）
    workspace-dir: ./workspace
    context:
      # 模型上下文窗口 Token 数（按当前默认模型）
      window-tokens: 128000
      # 四级水位线：SNIP 轻量裁剪 / PRUNE 占位替换 / COMPACT 增量摘要
      snip-line: 0.60
      prune-line: 0.80
      compact-line: 0.95
      # 保护区：最近 N token 不压缩
      protect-tail-tokens: 8000
      # 单条工具结果超过该字符数即外置落盘
      artifact-threshold-chars: 8000
      # artifact 外置存储目录
      artifact-dir: ./data/artifacts
    nudge:
      # Memory 复盘触发回合数 / Skill 复盘触发工具迭代数
      memory-turns: 10
      skill-iters: 10
    gate:
      # 危险工具名单（触发前置审批）
      dangerous-tools: execute_shell,write_file,send_email,delete_data
      # 审批等待超时（秒）
      approval-timeout-seconds: 600


# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    cn.kong.eon: DEBUG
    cn.kong.eon.persistence.mapper: INFO
    org.springframework.web: INFO
    org.mybatis: INFO
  file:
    name: ./logs/eon.log
    max-size: 100MB
    max-history: 30

# ==================== Actuator ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ==================== Knife4j ====================
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
