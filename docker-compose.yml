services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: z-brain-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-sk-ws-H.RYHDILP.oVEN.MEUCIQDvqfKy2fuPqF0WNGLFJ34-Gf1NRBKQKkslPej-CvpLHQIgQo7tH-VvR9DdoC3zYA3XnXrG5tMHB9sUnjCloROo-UA}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-21c6492284654354a26ff38320875d31}
    networks:
      - z-brain-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: z-brain-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8082}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - z-brain-net

networks:
  z-brain-net:
    driver: bridge
